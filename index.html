<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="משחק Snake קלאסי בדפדפן, מוכן לשיתוף מכל מכשיר.">
  <meta name="theme-color" content="#efe4c8">
  <meta property="og:title" content="Snake Classic">
  <meta property="og:description" content="משחק סנייק קלאסי שאפשר לפתוח ולשחק ישר מהדפדפן.">
  <meta property="og:type" content="website">
  <title>Snake Classic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="game-card">
      <header class="hero">
        <p class="eyebrow">משחק דפדפן קלאסי</p>
        <h1>Snake Classic</h1>
        <p class="subtitle">עמוד אחד, ללא התקנות, מוכן לשליחה כקישור.</p>
      </header>

      <div class="hud">
        <div>
          <p class="label">ניקוד</p>
          <p class="value" id="score">0</p>
        </div>
        <div>
          <p class="label">שיא</p>
          <p class="value" id="best-score">0</p>
        </div>
      </div>

      <canvas id="game-board" width="400" height="400" aria-label="Snake game board"></canvas>

      <div class="controls">
        <button id="start-button" type="button">התחל משחק</button>
        <button id="restart-button" type="button">התחל מחדש</button>
      </div>

      <div class="touch-controls" aria-label="Touch controls">
        <button type="button" class="direction-button up" data-direction="up">למעלה</button>
        <button type="button" class="direction-button left" data-direction="left">שמאלה</button>
        <button type="button" class="direction-button down" data-direction="down">למטה</button>
        <button type="button" class="direction-button right" data-direction="right">ימינה</button>
      </div>

      <p class="status" id="status">לחץ על התחל או על Space כדי לשחק.</p>

      <div class="instructions">
        <p>השתמש בחיצים, ב־WASD או בכפתורי המגע.</p>
        <p>אכול את האוכל האדום, תגדל, תזוז מהר יותר, ואל תפגע בקירות או בעצמך.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
